<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>月ノ裁 / Tsuki no Sabaki</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      overflow: hidden;
    }

    /* ── Scaling wrapper ──────────────────────────────
       All three screens live inside #stage; JS computes a CSS transform
       that scales 640×480 to the largest 4:3 rectangle the viewport holds.
       Fullscreen API targets #stage-outer so the black letterbox fills
       the monitor.                                                       */
    #stage-outer {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    #stage {
      position: relative;
      width: 640px;
      height: 480px;
      transform-origin: center center;
      flex-shrink: 0;
    }

    /* ── Shared screen size ───────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      width: 640px;
      height: 480px;
      overflow: hidden;
      user-select: none;
      flex-shrink: 0;
    }

    /* ── Main menu ────────────────────────────────── */
    #menu-screen { cursor: default; }
    #menu-screen .bg {
      position: absolute; top:0; left:0; width:640px; height:480px;
    }
    .menu-hotspot {
      position: absolute;
      cursor: pointer;
    }
    .menu-hotspot:hover { filter: brightness(1.35); }

    /* ── Chapter select ───────────────────────────── */
    #chapter-screen { display: none; cursor: default; }
    #chapter-screen .bg {
      position: absolute; top:0; left:0; width:640px; height:480px;
    }
    .ch-hotspot {
      position: absolute;
      cursor: pointer;
    }
    .ch-hotspot:hover { filter: brightness(1.3); }

    /* ── Game container ───────────────────────────── */
    #game-container {
      display: none;
      cursor: pointer;
      background: #000;
    }

    /* Canvas layers */
    #bg-canvas, #sprite-canvas {
      position: absolute; top: 0; left: 0;
      width: 640px; height: 480px;
    }
    #bg-canvas     { z-index: 1; }
    #sprite-canvas { z-index: 2; }

    /* ── Tooltip ──────────────────────────────────── */
    #vn-tooltip {
      position: fixed;
      padding: 5px 10px;
      background: rgba(0,0,0,0.82);
      color: #f0e8c8;
      font-size: 12px;
      border-radius: 4px;
      pointer-events: none;
      white-space: nowrap;
      z-index: 9999;
      display: none;
      border: 1px solid rgba(255,210,100,0.35);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }

    /* ── Dialogue box ─────────────────────────────── */
    /*
      All rendering (portrait + frame) done on #textbox-canvas via JS compositing.
      Frame mask makes it semi-transparent. Portrait mask removes black background.

      Layout in the 640×150 canvas:
        x: 0──────────168: portrait (composited with mask → transparent bg)
        x: 168─────────640: frame textwins.jpg (composited with mask → semi-transparent)
    */
    #textbox {
      position: absolute;
      bottom: 0; left: 0;
      width: 640px; height: 150px;
      z-index: 5;
      display: none;
    }

    /* Canvas that holds composited portrait + frame */
    #textbox-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 640px; height: 150px;
    }

    /* Text rendered on top of the canvas */
    #dialogue-area {
      position: absolute;
      left: 188px; right: 18px;
      top: 16px; bottom: 14px;
      z-index: 6;
    }
    #dialogue-text {
      font-size: 15px;
      line-height: 1.75;
      color: #e8eeff;
      white-space: pre-wrap;
    }
    #click-indicator {
      position: absolute;
      bottom: 0; right: 2px;
      color: #c8a840;
      font-size: 13px;
      animation: blink 0.85s infinite;
      display: none;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Fade overlay ─────────────────────────────── */
    #fade-overlay {
      position: absolute; inset: 0;
      background: #000; opacity: 0;
      z-index: 10; pointer-events: none;
    }

    /* ── Choice menu ──────────────────────────────── */
    /* ── Choice menu — matches PSG engine dark-wood panel style ── */
    #choice-menu {
      position: absolute;
      /* Vertically centred, horizontally matched to game width */
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      display: none;
      flex-direction: column;
      gap: 6px;
      width: 520px;           /* wide panels like the reference screenshots */
    }
    .choice-btn {
      background: linear-gradient(180deg, #5a2e10 0%, #3d1e08 60%, #2a1205 100%);
      border: 2px solid #7a4820;
      border-radius: 6px;
      color: #f0d8a0;
      padding: 16px 28px;
      font-size: 18px;
      font-family: 'Hiragino Sans', 'Noto Sans JP', 'Segoe UI', sans-serif;
      cursor: pointer;
      text-align: center;
      letter-spacing: 0.05em;
      box-shadow: 0 2px 6px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,220,140,0.15);
      transition: background 0.1s, border-color 0.1s;
    }
    .choice-btn:hover {
      background: linear-gradient(180deg, #7a3e18 0%, #5a2e10 60%, #3d1e08 100%);
      border-color: #c87840;
      color: #ffe8b0;
    }
    /* Branches the player has already picked are softened (muted gold text,
       a small checkmark in the corner) — the option is still pickable.   */
    .choice-btn.choice-visited {
      color: #a89060;
      border-color: #5a3a1c;
      position: relative;
    }
    .choice-btn.choice-visited::after {
      content: '✓';
      position: absolute;
      top: 4px; right: 10px;
      font-size: 14px;
      color: #8fbf60;
      opacity: 0.75;
    }

    /* ── Evidence-pending hint bar ───────────────────
       A thin amber bar at the very top of the game hints that right-click
       or key '1' opens the coat menu for evidence selection.             */
    #evidence-hint {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #c87800, #f0c040, #c87800);
      z-index: 27;
      display: none;
      pointer-events: none;
      animation: hint-pulse 1.5s ease-in-out infinite;
    }
    @keyframes hint-pulse {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1.0; }
    }

    /* ── Controls ─────────────────────────────────── */
    #controls {
      display: none;
      margin-top: 6px;
      gap: 8px;
      align-items: center;
    }
    #controls label { color: #445; font-size: 12px; }
    #controls select, #controls button {
      background: #12121e; color: #8899cc;
      border: 1px solid #223;
      padding: 3px 8px; border-radius: 3px;
      cursor: pointer; font-size: 12px;
    }
    #controls button:hover { background: #1e1e40; }
    #status {
      display: none;
      color: #334; font-size: 10px;
      margin-top: 3px; text-align: center;
    }

    /* ── Settings panel (modal overlay) ───────────────
       Opened via main-menu "Option" button or Esc key.
       z-index 100 = above everything in-game.                        */
    #settings-panel {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 100;
      display: none;
      align-items: center; justify-content: center;
      font-family: 'Hiragino Sans', 'Noto Sans JP', 'Segoe UI', sans-serif;
    }
    #settings-panel .sp-card {
      background: linear-gradient(180deg, #2a1a10 0%, #1a0d06 100%);
      border: 2px solid #7a4820;
      border-radius: 8px;
      padding: 24px 30px;
      width: 420px;
      color: #f0d8a0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,220,140,0.1);
    }
    #settings-panel h2 {
      margin: 0 0 18px;
      text-align: center;
      font-size: 20px;
      letter-spacing: 0.1em;
      color: #ffe8b0;
      font-weight: normal;
    }
    .sp-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0;
      gap: 12px;
    }
    .sp-row > label {
      font-size: 14px;
      color: #e8d0a0;
      flex: 1;
    }
    .sp-row select {
      background: #1a0d06;
      color: #f0d8a0;
      border: 1px solid #7a4820;
      padding: 4px 10px;
      border-radius: 3px;
      font-size: 13px;
      cursor: pointer;
      min-width: 140px;
    }
    .sp-row input[type="range"] {
      width: 180px;
      accent-color: #c87840;
    }
    .sp-row input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #c87840;
      cursor: pointer;
    }
    .sp-row .sp-val {
      display: inline-block;
      min-width: 36px;
      text-align: right;
      color: #c8a860;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    #sp-close {
      display: block;
      margin: 20px auto 0;
      background: linear-gradient(180deg, #5a2e10 0%, #3d1e08 100%);
      border: 2px solid #7a4820;
      border-radius: 4px;
      color: #f0d8a0;
      padding: 8px 28px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.1s, border-color 0.1s;
    }
    #sp-close:hover {
      background: linear-gradient(180deg, #7a3e18 0%, #5a2e10 100%);
      border-color: #c87840;
      color: #ffe8b0;
    }

    /* ── Pause menu (in-game ESC) ─────────────────── */
    #pause-menu {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 101;
      display: none;
      align-items: center; justify-content: center;
      font-family: 'Hiragino Sans', 'Noto Sans JP', 'Segoe UI', sans-serif;
    }
    #pause-menu .pm-card {
      background: linear-gradient(180deg, #2a1a10 0%, #1a0d06 100%);
      border: 2px solid #7a4820;
      border-radius: 8px;
      padding: 22px 28px;
      width: 300px;
      color: #f0d8a0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,220,140,0.1);
    }
    #pause-menu h2 {
      margin: 0 0 16px;
      text-align: center;
      font-size: 18px;
      letter-spacing: 0.1em;
      color: #ffe8b0;
      font-weight: normal;
    }
    .pm-btn {
      display: block; width: 100%;
      margin: 6px 0;
      background: linear-gradient(180deg, #5a2e10 0%, #3d1e08 100%);
      border: 2px solid #7a4820;
      border-radius: 4px;
      color: #f0d8a0;
      padding: 9px 16px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }
    .pm-btn:hover:not(:disabled) {
      background: linear-gradient(180deg, #7a3e18 0%, #5a2e10 100%);
      border-color: #c87840;
      color: #ffe8b0;
    }
    .pm-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Save/Load panel (8 slots) ────────────────── */
    #saveload-panel {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 102;
      display: none;
      align-items: center; justify-content: center;
      font-family: 'Hiragino Sans', 'Noto Sans JP', 'Segoe UI', sans-serif;
    }
    #saveload-panel .sl-card {
      background: linear-gradient(180deg, #2a1a10 0%, #1a0d06 100%);
      border: 2px solid #7a4820;
      border-radius: 8px;
      padding: 20px 24px 16px;
      width: 560px;
      max-height: 88vh;
      overflow-y: auto;
      color: #f0d8a0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,220,140,0.1);
    }
    #saveload-panel h2 {
      margin: 0 0 14px;
      text-align: center;
      font-size: 19px;
      letter-spacing: 0.1em;
      color: #ffe8b0;
      font-weight: normal;
    }
    #sl-slots {
      display: grid;
      grid-template-columns: minmax(0,1fr) minmax(0,1fr);
      gap: 10px;
    }
    .sl-slot {
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(40,24,12,0.6);
      border: 1px solid #5a2e10;
      border-radius: 4px;
      padding: 8px;
      cursor: pointer;
      min-width: 0;
      transition: background 0.1s, border-color 0.1s;
    }
    .sl-slot:hover {
      background: rgba(80,40,16,0.7);
      border-color: #c87840;
    }
    .sl-slot.empty {
      opacity: 0.55;
    }
    .sl-slot.empty:hover {
      background: rgba(60,30,12,0.55);
    }
    .sl-thumb {
      width: 80px; height: 60px;
      background: #000;
      border: 1px solid #3d1e08;
      flex-shrink: 0;
      object-fit: cover;
    }
    .sl-meta {
      flex: 1;
      min-width: 0;
      font-size: 11px;
      line-height: 1.4;
    }
    .sl-meta .sl-label {
      color: #ffe8b0;
      font-size: 13px;
      margin-bottom: 2px;
    }
    .sl-meta .sl-time {
      color: #c8a860;
      font-size: 10px;
    }
    .sl-meta .sl-preview {
      color: #e8d0a0;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sl-meta .sl-empty-label {
      color: #8a6040;
      font-style: italic;
    }
    .sl-slot .sl-del {
      align-self: flex-start;
      background: transparent;
      color: #8a6040;
      border: 1px solid #5a2e10;
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 10px;
      cursor: pointer;
      font-family: inherit;
    }
    .sl-slot .sl-del:hover {
      color: #f0d8a0;
      border-color: #c87840;
      background: #3d1e08;
    }
    #sl-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      font-size: 12px;
      color: #c8a860;
    }
    #sl-close {
      background: linear-gradient(180deg, #5a2e10 0%, #3d1e08 100%);
      border: 2px solid #7a4820;
      border-radius: 4px;
      color: #f0d8a0;
      padding: 6px 22px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    #sl-close:hover {
      background: linear-gradient(180deg, #7a3e18 0%, #5a2e10 100%);
      border-color: #c87840;
      color: #ffe8b0;
    }

    /* ── Help / Keybinding modal ───────────────────── */
    #help-panel {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 104;
      display: none;
      align-items: center; justify-content: center;
      font-family: 'Hiragino Sans', 'Noto Sans JP', 'Segoe UI', sans-serif;
    }
    #help-panel .help-card {
      background: linear-gradient(180deg, #2a1a10 0%, #1a0d06 100%);
      border: 2px solid #7a4820;
      border-radius: 8px;
      padding: 20px 24px 16px;
      width: 520px;
      max-height: 88vh;
      color: #f0d8a0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,220,140,0.1);
      display: flex; flex-direction: column;
    }
    #help-panel h2 {
      margin: 0 0 14px;
      text-align: center;
      font-size: 18px;
      letter-spacing: 0.1em;
      color: #ffe8b0;
      font-weight: normal;
    }
    #help-panel table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      color: #e8d8b0;
    }
    #help-panel td {
      padding: 6px 8px;
      border-bottom: 1px dashed rgba(122,72,32,0.3);
      vertical-align: middle;
    }
    #help-panel td:first-child {
      width: 140px;
      color: #ffe0a0;
    }
    #help-panel kbd {
      display: inline-block;
      background: #2a1a10;
      border: 1px solid #7a4820;
      border-radius: 3px;
      padding: 2px 7px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #ffe8b0;
      margin-right: 4px;
    }
    #help-panel .help-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }
    #help-close {
      background: linear-gradient(180deg, #5a2e10 0%, #3d1e08 100%);
      border: 2px solid #7a4820;
      border-radius: 4px;
      color: #f0d8a0;
      padding: 6px 22px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    #help-close:hover {
      background: linear-gradient(180deg, #7a3e18 0%, #5a2e10 100%);
      border-color: #c87840;
    }

    /* ── Gallery panel (CG + BGM jukebox) ─────────── */
    #gallery-panel {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 105;
      display: none;
      align-items: center; justify-content: center;
      font-family: 'Hiragino Sans', 'Noto Sans JP', 'Segoe UI', sans-serif;
    }
    #gallery-panel .gal-card {
      background: linear-gradient(180deg, #2a1a10 0%, #1a0d06 100%);
      border: 2px solid #7a4820;
      border-radius: 8px;
      padding: 16px 20px 14px;
      width: min(860px, 94vw);
      max-height: 90vh;
      display: flex; flex-direction: column;
      color: #f0d8a0;
      box-shadow: 0 4px 28px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,220,140,0.1);
    }
    #gallery-panel h2 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 18px;
      letter-spacing: 0.1em;
      color: #ffe8b0;
      font-weight: normal;
    }
    .gal-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      border-bottom: 1px solid #5a2e10;
    }
    .gal-tab {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #a8906a;
      font-family: inherit;
      font-size: 14px;
      padding: 6px 18px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .gal-tab:hover { color: #e8d8b0; }
    .gal-tab.active {
      color: #ffe8b0;
      border-bottom-color: #c87840;
    }
    .gal-body {
      flex: 1;
      overflow-y: auto;
      min-height: 260px;
      background: rgba(0,0,0,0.35);
      border: 1px solid #3d1e08;
      border-radius: 4px;
      padding: 12px;
    }
    .gal-empty {
      color: #8f7a50;
      text-align: center;
      padding: 60px 0;
      font-size: 13px;
    }
    /* CG Gallery grid */
    #gal-cg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
    }
    .gal-cg-cell {
      position: relative;
      aspect-ratio: 4 / 3;
      background: #000;
      border: 1px solid #5a2e10;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.1s, transform 0.1s;
    }
    .gal-cg-cell:hover {
      border-color: #c87840;
      transform: scale(1.02);
    }
    .gal-cg-cell img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .gal-cg-label {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.85), transparent);
      color: #f0d8a0;
      font-size: 10px;
      padding: 8px 6px 4px;
      text-align: center;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.03em;
    }
    /* CG fullscreen preview */
    #gal-cg-preview {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 106;
      display: none;
      align-items: center; justify-content: center;
      cursor: pointer;
    }
    #gal-cg-preview img {
      max-width: 96vw;
      max-height: 96vh;
      object-fit: contain;
      box-shadow: 0 0 40px rgba(0,0,0,0.9);
    }
    /* BGM jukebox list */
    .gal-bgm-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 10px;
      border-bottom: 1px dashed rgba(122,72,32,0.3);
      font-size: 13px;
    }
    .gal-bgm-row:last-child { border-bottom: none; }
    .gal-bgm-row.playing {
      background: rgba(200,120,64,0.12);
      color: #ffe8b0;
    }
    .gal-bgm-name {
      flex: 1;
      font-family: 'Courier New', monospace;
      color: #e8d8b0;
    }
    .gal-bgm-play, .gal-bgm-stop {
      background: linear-gradient(180deg, #5a2e10 0%, #3d1e08 100%);
      border: 1px solid #7a4820;
      border-radius: 3px;
      color: #f0d8a0;
      padding: 4px 14px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }
    .gal-bgm-play:hover, .gal-bgm-stop:hover {
      background: linear-gradient(180deg, #7a3e18 0%, #5a2e10 100%);
      border-color: #c87840;
    }
    .gal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-size: 11px;
      color: #c8a860;
    }
    #gal-close {
      background: linear-gradient(180deg, #5a2e10 0%, #3d1e08 100%);
      border: 2px solid #7a4820;
      border-radius: 4px;
      color: #f0d8a0;
      padding: 6px 22px;
      font-size: 13px;

<script src="engine/engine.js"></script>
<script>
  // ── Responsive scaling + fullscreen ────────────────
  // Keeps the 640×480 coordinate system intact; only scales visually to fit.
  const stageEl = document.getElementById('stage');
  const stageOuterEl = document.getElementById('stage-outer');
  const BASE_W = 640, BASE_H = 480;
  function relayoutStage() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const scale = Math.max(0.25, Math.min(vw / BASE_W, vh / BASE_H));
    stageEl.style.transform = `scale(${scale})`;
  }
  window.addEventListener('resize', relayoutStage);
  document.addEventListener('fullscreenchange', relayoutStage);
  document.addEventListener('webkitfullscreenchange', relayoutStage);
  relayoutStage();

  function toggleFullscreen() {
    const el = stageOuterEl;
    const isFs = document.fullscreenElement || document.webkitFullscreenElement;
    if (isFs) {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    } else {
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    }
  }
  window._toggleFullscreen = toggleFullscreen;

  document.addEventListener('keydown', e => {
    // F toggles fullscreen — skip when focus is in an input or any modal typing
    if (e.code === 'KeyF' && !e.ctrlKey && !e.metaKey && !e.altKey) {
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      e.preventDefault();
      toggleFullscreen();
    }
  });

  // ── Populate script selector ──────────────────────
  const scripts = [
    's02_01','s02_02','s02_03','s02_04','s02_05','s02_06',
    's02_07','s02_08','s02_09','s02_10','s02_11',
    's02_20','s02_21','s02_22','s02_23','s02_24','s02_25','s02_26','s02_27',
    's03_01','s03_02','s03_03','s03_04','s03_05','s03_06',
    'akane','ciel','haruka','karen','mitsuki','sakuya','gameover',
  ];
  const scriptSel = document.getElementById('script-select');
  scripts.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    scriptSel.appendChild(o);
  });
  scriptSel.value = 's02_01';

  // ── Screen elements ───────────────────────────────
  const menuScreen    = document.getElementById('menu-screen');
  const chapterScreen = document.getElementById('chapter-screen');
  const gameContainer = document.getElementById('game-container');
  const controls      = document.getElementById('controls');
  const statusBar     = document.getElementById('status');

  function showMenu() {
    menuScreen.style.display    = 'block';
    chapterScreen.style.display = 'none';
    gameContainer.style.display = 'none';
    controls.style.display      = 'none';
    statusBar.style.display     = 'none';
  }
  function showChapterSelect() {
    menuScreen.style.display    = 'none';
    chapterScreen.style.display = 'block';
    gameContainer.style.display = 'none';
    controls.style.display      = 'none';
    statusBar.style.display     = 'none';
  }
  function startGame(scriptName) {
    menuScreen.style.display    = 'none';
    chapterScreen.style.display = 'none';
    gameContainer.style.display = 'block';
    controls.style.display      = 'flex';
    statusBar.style.display     = 'block';
    scriptSel.value = scriptName;
    VN.restart();
  }

  function startGameWithIntro() {
    menuScreen.style.display    = 'none';
    chapterScreen.style.display = 'none';
    gameContainer.style.display = 'block';
    controls.style.display      = 'flex';
    statusBar.style.display     = 'block';

    const vid = document.getElementById('intro-video');

    function launchAkane() {
      vid.style.display = 'none';
      vid.pause();
      vid.currentTime = 0;
      scriptSel.value = 'akane';
      VN.restart();
    }

    // Try playing the intro video; fall back immediately if unavailable
    vid.style.display = 'block';
    vid.currentTime   = 0;
    vid.onended       = launchAkane;
    vid.onerror       = launchAkane;

    // Also allow clicking the video to skip it
    vid.onclick = launchAkane;

    const playPromise = vid.play();
    if (playPromise !== undefined) {
      playPromise.catch(() => launchAkane());
    }
  }

  // ── Menu button wiring ────────────────────────────
  document.getElementById('menu-start').onclick  = showChapterSelect;
  document.getElementById('menu-load').onclick   = () => openSaveLoad('load');
  document.getElementById('menu-option').onclick = () => openSettings();
  document.getElementById('menu-exit').onclick   = () => window.close();

  // ── Chapter select wiring ─────────────────────────
  document.getElementById('ch-1').onclick    = () => startGameWithIntro();   // intro video → akane
  document.getElementById('ch-2').onclick    = () => startGame('s02_01');    // 反転姉妹 upper
  document.getElementById('ch-3').onclick    = () => startGame('s03_01');    // 反転、そしてサヨナラ
  document.getElementById('ch-back').onclick = showMenu;

  // ── Global hooks for engine ───────────────────────
  window._showMenu          = showMenu;
  window._showChapterSelect = showChapterSelect;

  // ── Tooltip system ────────────────────────────────
  // Shows a styled tooltip for any element with data-tip attribute.
  const _tip = document.getElementById('vn-tooltip');
  let _tipTarget = null;

  document.addEventListener('mouseover', e => {
    const el = e.target.closest('[data-tip]');
    if (!el) return;
    _tipTarget = el;
    _tip.textContent = el.dataset.tip;
    _tip.style.display = 'block';
  });

  document.addEventListener('mousemove', e => {
    if (!_tipTarget) return;
    // Keep tooltip near cursor but prevent going off-screen
    const x = Math.min(e.clientX + 14, window.innerWidth - _tip.offsetWidth - 8);
    const y = Math.max(e.clientY - 32, 4);
    _tip.style.left = x + 'px';
    _tip.style.top  = y + 'px';
  });

  document.addEventListener('mouseout', e => {
    const el = e.target.closest('[data-tip]');
    if (el) { _tipTarget = null; _tip.style.display = 'none'; }
  });

  // ── Settings panel wiring ─────────────────────────
  const spPanel    = document.getElementById('settings-panel');
  const spTextSpd  = document.getElementById('sp-text-speed');
  const spBgmVol   = document.getElementById('sp-bgm-vol');
  const spBgmVal   = document.getElementById('sp-bgm-val');
  const spSeVol    = document.getElementById('sp-se-vol');
  const spSeVal    = document.getElementById('sp-se-val');
  const spMuted    = document.getElementById('sp-muted');
  const spFontSize = document.getElementById('sp-font-size');
  const spClose    = document.getElementById('sp-close');

  function hydrateSettingsUI() {
    const s = VN.settings.all();
    spTextSpd.value  = String(s.textSpeed);
    spBgmVol.value   = Math.round(s.bgmVolume * 100);
    spBgmVal.textContent = spBgmVol.value;
    spSeVol.value    = Math.round(s.seVolume * 100);
    spSeVal.textContent  = spSeVol.value;
    spMuted.checked  = !!s.muted;
    spFontSize.value = String(s.fontSize);
  }

  function openSettings()  { hydrateSettingsUI(); spPanel.style.display = 'flex'; }
  function closeSettings() { spPanel.style.display = 'none'; }
  function toggleSettings() {
    if (spPanel.style.display === 'flex') closeSettings(); else openSettings();
  }
  window._toggleSettings = toggleSettings;

  // Live-update handlers
  spTextSpd.addEventListener('change', e =>
    VN.settings.set('textSpeed', parseInt(e.target.value, 10)));
  spBgmVol.addEventListener('input', e => {
    const v = parseInt(e.target.value, 10);
    spBgmVal.textContent = v;
    VN.settings.set('bgmVolume', v / 100);
  });
  spSeVol.addEventListener('input', e => {
    const v = parseInt(e.target.value, 10);
    spSeVal.textContent = v;
    VN.settings.set('seVolume', v / 100);
  });
  spMuted.addEventListener('change', e =>
    VN.settings.set('muted', e.target.checked));
  spFontSize.addEventListener('change', e =>
    VN.settings.set('fontSize', parseInt(e.target.value, 10)));

  spClose.addEventListener('click', closeSettings);
  // Click backdrop to close (but not clicks inside the card)
  spPanel.addEventListener('click', e => {
    if (e.target === spPanel) closeSettings();
  });

  // ── Pause menu wiring ─────────────────────────────
  const pmPanel    = document.getElementById('pause-menu');
  const pmSaveBtn  = document.getElementById('pm-save');
  const pmLoadBtn  = document.getElementById('pm-load');
  const pmCfgBtn   = document.getElementById('pm-settings');
  const pmTitleBtn = document.getElementById('pm-title');
  const pmResume   = document.getElementById('pm-resume');

  function openPauseMenu() {
    // Disable Save if the engine can't currently snapshot (e.g. mid-fade/choice)
    pmSaveBtn.disabled = !VN.saves.canSave();
    pmPanel.style.display = 'flex';
  }
  function closePauseMenu() { pmPanel.style.display = 'none'; }
  function togglePauseMenu() {
    if (pmPanel.style.display === 'flex') closePauseMenu(); else openPauseMenu();
  }
  window._togglePauseMenu = togglePauseMenu;

  pmResume.addEventListener('click', closePauseMenu);
  pmCfgBtn.addEventListener('click', () => { closePauseMenu(); openSettings(); });
  pmSaveBtn.addEventListener('click', () => {
    if (pmSaveBtn.disabled) return;
    closePauseMenu(); openSaveLoad('save');
  });
  pmLoadBtn.addEventListener('click', () => { closePauseMenu(); openSaveLoad('load'); });
  pmTitleBtn.addEventListener('click', () => {
    if (!confirm('Return to main menu? Unsaved progress will be lost.')) return;
    closePauseMenu();
    VN.backToMenu();
  });
  pmPanel.addEventListener('click', e => {
    if (e.target === pmPanel) closePauseMenu();
  });

  // ── Save/Load UI wiring ───────────────────────────
  const slPanel = document.getElementById('saveload-panel');
  const slTitle = document.getElementById('sl-title');
  const slSlots = document.getElementById('sl-slots');
  const slHint  = document.getElementById('sl-hint');
  const slClose = document.getElementById('sl-close');
  let slMode = 'load';   // 'save' | 'load'

  const SLOT_LABELS = {
    auto:  'Auto',
    quick: 'Quick',
    '1': 'Slot 1', '2': 'Slot 2', '3': 'Slot 3',
    '4': 'Slot 4', '5': 'Slot 5', '6': 'Slot 6',
  };

  function fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ` +
           `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function renderSlots() {
    slSlots.innerHTML = '';
    VN.saves.list().forEach(({ slot, data }) => {
      const el = document.createElement('div');
      el.className = 'sl-slot' + (data ? '' : ' empty');
      const label = SLOT_LABELS[slot] || slot;
      if (data) {
        el.innerHTML = `
          <img class="sl-thumb" src="${data.thumbnail || ''}" alt="">
          <div class="sl-meta">
            <div class="sl-label">${label} · ${data.scriptName || '?'}</div>
            <div class="sl-time">${fmtTime(data.timestamp)}</div>
            <div class="sl-preview"></div>
          </div>`;
        el.querySelector('.sl-preview').textContent = data.preview || '';
        // Delete button (manual slots only)
        if (slot !== 'auto') {
          const del = document.createElement('button');
          del.className = 'sl-del';
          del.textContent = '×';
          del.title = 'Delete save';
          del.onclick = (e) => {
            e.stopPropagation();
            if (!confirm(`Delete ${label}?`)) return;
            VN.saves.erase(slot);
            renderSlots();
          };
          el.appendChild(del);
        }
      } else {
        el.innerHTML = `
          <div class="sl-thumb"></div>
          <div class="sl-meta">
            <div class="sl-label">${label}</div>
            <div class="sl-empty-label">-- Empty --</div>
          </div>`;
      }
      el.addEventListener('click', () => onSlotClick(slot, data));
      slSlots.appendChild(el);
    });
  }

  async function onSlotClick(slot, data) {
    if (slMode === 'save') {
      if (slot === 'auto') return;                                  // auto is engine-managed
      if (data && !confirm(`Overwrite ${SLOT_LABELS[slot]}?`)) return;
      if (!VN.saves.canSave()) {
        alert('Cannot save right now. Wait for dialogue to finish and try again.');
        return;
      }
      const ok = VN.saves.write(slot);
      if (ok) { renderSlots(); }
      else    { alert('Save failed.'); }
    } else {
      if (!data) return;
      closeSaveLoad();
      // Ensure the game screen is visible before restoring
      if (typeof startGameForRestore === 'function') startGameForRestore();
      const ok = await VN.saves.restore(slot);
      if (!ok) alert('Load failed — save file is missing or corrupted.');
    }
  }

  function openSaveLoad(mode) {
    slMode = mode;
    slTitle.textContent = mode === 'save' ? 'セーブ / Save' : 'ロード / Load';
    slHint.textContent  = mode === 'save'
      ? 'Click an empty slot to save. Click a filled slot to overwrite.'
      : 'Click a slot to load.';
    renderSlots();
    slPanel.style.display = 'flex';
  }
  function closeSaveLoad() { slPanel.style.display = 'none'; }

  slClose.addEventListener('click', closeSaveLoad);
  slPanel.addEventListener('click', e => {
    if (e.target === slPanel) closeSaveLoad();
  });

  // Helper: from main-menu Load, a successful restore needs the game screen visible
  function startGameForRestore() {
    menuScreen.style.display    = 'none';
    chapterScreen.style.display = 'none';
    gameContainer.style.display = 'block';
    controls.style.display      = 'flex';
    statusBar.style.display     = 'block';
  }

  // ── Backlog UI wiring ─────────────────────────────
  const blPanel   = document.getElementById('backlog-panel');
  const blEntries = document.getElementById('bl-entries');
  const blCount   = document.getElementById('bl-count');
  const blClose   = document.getElementById('bl-close');
  const pmLog     = document.getElementById('pm-log');

  function currentLangForDisplay() {
    return document.getElementById('lang-select').value || 'jp';
  }

  function pickBacklogText(entry, lang) {
    if (lang === 'cn' && entry.zh && entry.zh !== entry.jp) return entry.zh;
    if (lang !== 'jp' && entry.text && entry.text !== entry.jp) return entry.text;
    return entry.jp;
  }

  function renderBacklog() {
    const lang = currentLangForDisplay();
    const items = VN.getBacklog();
    blEntries.innerHTML = '';
    items.forEach(entry => {
      const txt = pickBacklogText(entry, lang)
        .replace(/\x07/g, '')
        .replace(/!s|@/g, '')
        .split('\n')
        .map(l => l.replace(/^\u3000+/, ''))
        .join('\n')
        .trim();
      if (!txt) return;
      const el = document.createElement('div');
      el.className = 'bl-entry';
      el.textContent = txt;
      if (entry.color) el.style.color = entry.color;
      blEntries.appendChild(el);
    });
    blCount.textContent = `${items.length} / 200 lines`;
    // Scroll to bottom (newest at the bottom)
    blEntries.scrollTop = blEntries.scrollHeight;
  }

  function openBacklog()  { renderBacklog(); blPanel.style.display = 'flex'; }
  function closeBacklog() { blPanel.style.display = 'none'; }
  function toggleBacklog() {
    if (blPanel.style.display === 'flex') closeBacklog(); else openBacklog();
  }
  window._openBacklog   = openBacklog;
  window._toggleBacklog = toggleBacklog;

  blClose.addEventListener('click', closeBacklog);
  blPanel.addEventListener('click', e => {
    if (e.target === blPanel) closeBacklog();
  });
  pmLog.addEventListener('click', () => { closePauseMenu(); openBacklog(); });

  // ── Help modal wiring ─────────────────────────────
  const helpPanel = document.getElementById('help-panel');
  const helpClose = document.getElementById('help-close');
  const pmHelp    = document.getElementById('pm-help');
  function openHelp()  { helpPanel.style.display = 'flex'; }
  function closeHelp() { helpPanel.style.display = 'none'; }
  function toggleHelp() {
    if (helpPanel.style.display === 'flex') closeHelp(); else openHelp();
  }
  window._toggleHelp = toggleHelp;
  helpClose.addEventListener('click', closeHelp);
  helpPanel.addEventListener('click', e => {
    if (e.target === helpPanel) closeHelp();
  });
  pmHelp.addEventListener('click', () => { closePauseMenu(); openHelp(); });

  // '?' key anywhere → toggle help
  document.addEventListener('keydown', e => {
    if ((e.key === '?' || (e.key === '/' && e.shiftKey)) && !e.ctrlKey && !e.metaKey) {
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      e.preventDefault();
      toggleHelp();
    }
  });

  // ── Gallery modal wiring ──────────────────────────
  const galPanel  = document.getElementById('gallery-panel');
  const galBody   = document.getElementById('gal-body');
  const galCount  = document.getElementById('gal-count');
  const galClose  = document.getElementById('gal-close');
  const galTabs   = [...document.querySelectorAll('.gal-tab')];
  const galPreview    = document.getElementById('gal-cg-preview');
  const galPreviewImg = document.getElementById('gal-cg-preview-img');
  const menuGalleryBtn = document.getElementById('menu-gallery-btn');
  const pmGallery      = document.getElementById('pm-gallery');

  let galTab = 'cg';
  let galCurrentBgm = null;  // file currently previewing (for play/stop UI)

  function renderGalCG() {
    const bgs = VN.gallery.bgs();
    galBody.innerHTML = '';
    if (!bgs.length) {
      galBody.innerHTML = '<div class="gal-empty">まだ解放されたCGがありません<br><span style="opacity:0.7">Play through the story to unlock CGs.</span></div>';
      galCount.textContent = '0 CG';
      return;
    }
    const grid = document.createElement('div');
    grid.id = 'gal-cg-grid';
    bgs.forEach(name => {
      const cell = document.createElement('div');
      cell.className = 'gal-cg-cell';
      cell.title = name;
      const img = document.createElement('img');
      img.src = `assets/bg/${name}.jpg`;
      img.alt = name;
      img.loading = 'lazy';
      cell.appendChild(img);
      const label = document.createElement('div');
      label.className = 'gal-cg-label';
      label.textContent = name;
      cell.appendChild(label);
      cell.addEventListener('click', () => {
        galPreviewImg.src = `assets/bg/${name}.jpg`;
        galPreview.style.display = 'flex';
      });
      grid.appendChild(cell);
    });
    galBody.appendChild(grid);
    galCount.textContent = `${bgs.length} CG`;
  }

  function renderGalBGM() {
    const bgms = VN.gallery.bgms();
    galBody.innerHTML = '';
    if (!bgms.length) {
      galBody.innerHTML = '<div class="gal-empty">まだ解放されたBGMがありません<br><span style="opacity:0.7">Play through the story to unlock BGM tracks.</span></div>';
      galCount.textContent = '0 BGM';
      return;
    }
    bgms.forEach(file => {
      const row = document.createElement('div');
      row.className = 'gal-bgm-row' + (file === galCurrentBgm ? ' playing' : '');
      const name = document.createElement('div');
      name.className = 'gal-bgm-name';
      name.textContent = file;
      const btn = document.createElement('button');
      const isPlaying = file === galCurrentBgm;
      btn.className = isPlaying ? 'gal-bgm-stop' : 'gal-bgm-play';
      btn.textContent = isPlaying ? '■ Stop' : '▶ Play';
      btn.addEventListener('click', () => {
        if (isPlaying) {
          VN.previewBGMStop();
          galCurrentBgm = null;
        } else {
          VN.previewBGM(file);
          galCurrentBgm = file;
        }
        renderGalBGM();
      });
      row.appendChild(name);
      row.appendChild(btn);
      galBody.appendChild(row);
    });
    galCount.textContent = `${bgms.length} BGM`;
  }

  function renderGallery() {
    galTabs.forEach(t => t.classList.toggle('active', t.dataset.tab === galTab));
    if (galTab === 'cg') renderGalCG(); else renderGalBGM();
  }

  function openGallery()  { galTab = 'cg'; renderGallery(); galPanel.style.display = 'flex'; }
  function closeGallery() {
    galPanel.style.display = 'none';
    galPreview.style.display = 'none';
    // Stop any jukebox preview on close so it doesn't keep playing
    if (galCurrentBgm) { VN.previewBGMStop(); galCurrentBgm = null; }
  }
  window._openGallery = openGallery;

  galTabs.forEach(t => t.addEventListener('click', () => {
    galTab = t.dataset.tab;
    renderGallery();
  }));
  galClose.addEventListener('click', closeGallery);
  galPanel.addEventListener('click', e => { if (e.target === galPanel) closeGallery(); });
  galPreview.addEventListener('click', () => { galPreview.style.display = 'none'; });
  menuGalleryBtn.addEventListener('click', openGallery);
  pmGallery.addEventListener('click', () => { closePauseMenu(); openGallery(); });
</script>
</body>
</html>
